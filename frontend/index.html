<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StreamFlix</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Top bar with the title and the login area -->
  <header class="site-header">
    <h1>StreamFlix</h1>
    <div id="auth-box" class="auth-box"></div>
  </header>

  <main>
    <!-- Intro text at the top -->
    <section class="hero">
      <p class="eyebrow">Now streaming</p>
      <h2>Find your next movie night pick.</h2>
      <p>Browse trending titles, filter by genre, and save favorites to your personal list.</p>
    </section>

    <!-- Search box and genre dropdown -->
    <section class="toolbar" aria-label="Movie filters">
      <label>
        Search
        <input id="search" type="search" placeholder="Search by title or genre" />
      </label>
      <label>
        Genre
        <select id="genre-filter">
          <option value="all">All genres</option>
        </select>
      </label>
    </section>

    <!-- Little message area for things like "Added to your list" -->
    <div id="status" class="status" role="status" aria-live="polite"></div>

    <!-- All the movies -->
    <section>
      <div class="section-title">
        <h2>Trending</h2>
        <span id="movie-count"></span>
      </div>
      <div id="movies" class="row"></div>
    </section>

    <!-- The movies the user saved -->
    <section>
      <div class="section-title">
        <h2>My List</h2>
        <span id="watchlist-count"></span>
      </div>
      <div id="watchlist" class="row"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
